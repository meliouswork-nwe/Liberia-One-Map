<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Map Test</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; }

#overlay {
  position:fixed; inset:0; z-index:9999;
  background:#0d1f35;
  display:flex; align-items:center; justify-content:center;
}
#overlay.hidden { display:none; }

#map { position:fixed; inset:0; z-index:1; }
</style>
</head>
<body>

<div id="overlay">
  <div style="background:#fff;padding:40px;border-radius:8px;text-align:center;max-width:360px;width:90%">
    <h2 style="margin-bottom:16px;font-family:sans-serif">LrOneMap Test</h2>
    <input id="pw" type="password" placeholder="Enter code"
           style="width:100%;padding:10px;font-size:16px;margin-bottom:12px;border:2px solid #ccc;border-radius:4px;text-align:center"
           onkeydown="if(event.key==='Enter')go()"/>
    <button onclick="go()"
            style="width:100%;padding:12px;background:#c8102e;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:bold;cursor:pointer">
      Enter
    </button>
    <div id="msg" style="color:red;margin-top:8px;font-size:13px"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var map = null;

function go() {
  var val = document.getElementById('pw').value.trim().toLowerCase();
  if (val === 'liberia2026') {
    document.getElementById('overlay').classList.add('hidden');
    if (!map) {
      map = L.map('map').setView([6.5, -9.5], 7);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
    }
  } else {
    document.getElementById('msg').textContent = 'Wrong code';
  }
}
</script>
</body>
</html>
